<!DOCTYPE html>
<html lang="{{ .Lang }}">
<head>
  {{- partial "head.html" . -}}
</head>
<body>
  <a href="#main-content" class="skip-link">{{ i18n "skip_to_content" }}</a>
  {{- partial "nav.html" . -}}

  <main id="main-content" tabindex="-1">
    {{- block "main" . }}{{- end }}
  </main>

  {{- partial "footer.html" . -}}

  <script src="{{ "js/i18n.js" | relURL }}"></script>
  <script src="{{ "js/main.js" | relURL }}"></script>
</body>
</html>
